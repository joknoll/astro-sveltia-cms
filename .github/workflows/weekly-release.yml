name: Weekly Dependency Update & Release

on:
  schedule:
    - cron: '0 8 * * 1' # Every Monday at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install current dependencies
        run: npm ci

      - name: Update dependencies to latest
        run: npx ncu -u && npm install

      - name: Check for dependency changes
        id: changes
        run: |
          if git diff --quiet package.json package-lock.json; then
            echo "detected=false" >> "$GITHUB_OUTPUT"
          else
            echo "detected=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.changes.outputs.detected == 'true'
        run: npm run build

      - name: Bump patch version
        if: steps.changes.outputs.detected == 'true'
        run: |
          npm version patch --no-git-tag-version
          echo "NEW_VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_ENV"

      - name: Configure git
        if: steps.changes.outputs.detected == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit, tag, and push
        if: steps.changes.outputs.detected == 'true'
        run: |
          git add package.json package-lock.json
          git commit -m "${{ env.NEW_VERSION }}"
          git tag "${{ env.NEW_VERSION }}"
          git push
          git push --tags

      - name: Publish to npm
        if: steps.changes.outputs.detected == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.changes.outputs.detected == 'true'
        run: gh release create "${{ env.NEW_VERSION }}" --title "${{ env.NEW_VERSION }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
